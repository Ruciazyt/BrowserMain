name: Build Extension

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        working-directory: website
        run: pnpm install --frozen-lockfile

      - name: Build extension
        working-directory: website
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: browser-main-extension
          path: website/dist
          retention-days: 30

  release:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: browser-main-extension
          path: dist

      - name: Create zip for Chrome Web Store
        run: |
          cd dist
          zip -r ../browser-main.zip .
          cd ..

      - name: Delete old release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Delete existing release if any (to avoid duplicates)
          for i in $(gh release list --limit 5 --jq '.[] | select(.tagName | startswith("build-")) | .tagName'); do
            gh release delete "$i" --yes 2>/dev/null || true
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: browser-main.zip
          tag_name: build-${{ github.run_number }}
          name: Build #${{ github.run_number }}
          draft: false
          prerelease: false
          generate_release_notes: true
