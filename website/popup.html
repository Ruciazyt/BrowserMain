<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add to BrowserMain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --led-amber: #ff9500;
      --led-amber-warm: #ffb347;
      --accent-aqua: #5ee7df;
      --panel: #12121a;
      --border: #1e1e2e;
      --text: #c8c8d0;
      --text-dim: #6e6e7e;
      --danger: #ff5f5f;
      --gray-btn: #2a2a3a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      width: 300px;
      min-height: 0;
      max-height: 480px;
      overflow-y: auto;
      padding: 0;
    }

    /* ── Header ──────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
    }

    .header-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--led-amber);
      box-shadow: 0 0 6px var(--led-amber), 0 0 12px rgba(255, 149, 0, 0.4);
      flex-shrink: 0;
    }

    .header-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--led-amber);
      text-transform: uppercase;
    }

    /* ── Form ─────────────────────────────────────────────────── */
    .form {
      padding: 14px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── Favicon row ──────────────────────────────────────────── */
    .favicon-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      min-height: 40px;
    }

    .favicon-row img {
      width: 18px;
      height: 18px;
      border-radius: 3px;
      flex-shrink: 0;
      object-fit: contain;
    }

    .favicon-domain {
      font-size: 11px;
      color: var(--text-dim);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Input fields ─────────────────────────────────────────── */
    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .field input {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      width: 100%;
    }

    .field input::placeholder {
      color: var(--text-dim);
    }

    .field input:focus {
      border-color: var(--accent-aqua);
      box-shadow: 0 0 0 2px rgba(94, 231, 223, 0.12);
    }

    .field input.input-error {
      border-color: var(--danger);
      box-shadow: 0 0 0 2px rgba(255, 95, 95, 0.15);
    }

    /* ── Message bar ─────────────────────────────────────────── */
    .msg-bar {
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 5px;
      min-height: 28px;
      display: none;
    }

    .msg-bar.visible {
      display: block;
    }

    .msg-bar.error {
      color: var(--danger);
      background: rgba(255, 95, 95, 0.1);
      border: 1px solid rgba(255, 95, 95, 0.25);
    }

    .msg-bar.warning {
      color: var(--led-amber-warm);
      background: rgba(255, 179, 71, 0.1);
      border: 1px solid rgba(255, 179, 71, 0.25);
    }

    .msg-bar.success {
      color: var(--accent-aqua);
      background: rgba(94, 231, 223, 0.1);
      border: 1px solid rgba(94, 231, 223, 0.25);
    }

    /* ── Buttons ─────────────────────────────────────────────── */
    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 2px;
    }

    .btn {
      flex: 1;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      padding: 9px 0;
      border-radius: 6px;
      border: 1px solid;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s, opacity 0.15s;
      letter-spacing: 0.04em;
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .btn-save {
      background: transparent;
      color: var(--accent-aqua);
      border-color: var(--accent-aqua);
    }

    .btn-save:not(:disabled):hover {
      background: rgba(94, 231, 223, 0.1);
      box-shadow: 0 0 10px rgba(94, 231, 223, 0.2);
    }

    .btn-cancel {
      background: var(--gray-btn);
      color: var(--text-dim);
      border-color: var(--border);
    }

    .btn-cancel:not(:disabled):hover {
      background: #353545;
    }

    /* ── Success flash ────────────────────────────────────────── */
    .success-flash {
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      color: var(--accent-aqua);
      font-size: 13px;
      gap: 8px;
    }

    .success-flash.visible {
      display: flex;
    }

    .checkmark {
      width: 20px;
      height: 20px;
      border: 2px solid var(--accent-aqua);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .checkmark::after {
      content: '';
      display: block;
      width: 8px;
      height: 4px;
      border-left: 2px solid var(--accent-aqua);
      border-bottom: 2px solid var(--accent-aqua);
      transform: rotate(-45deg) translate(1px, -1px);
    }

    datalist {
      display: none;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-dot"></div>
    <span class="header-title">Add Shortcut</span>
  </div>

  <form class="form" id="form" novalidate>
    <div class="favicon-row">
      <img id="favicon-preview" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="favicon" width="18" height="18">
      <span class="favicon-domain" id="favicon-domain">—</span>
    </div>

    <div class="field">
      <label for="url-input">URL</label>
      <input
        id="url-input"
        type="url"
        placeholder="https://"
        autocomplete="off"
        spellcheck="false"
      >
    </div>

    <div class="field">
      <label for="title-input">Title</label>
      <input
        id="title-input"
        type="text"
        placeholder="Shortcut name"
        autocomplete="off"
        spellcheck="false"
      >
    </div>

    <div class="field">
      <label for="group-input">Group <span style="opacity:0.4;font-size:9px">(optional)</span></label>
      <input
        id="group-input"
        type="text"
        placeholder="e.g. Work, Social"
        autocomplete="off"
        spellcheck="false"
        list="group-suggestions"
      >
      <datalist id="group-suggestions"></datalist>
    </div>

    <div class="msg-bar" id="msg-bar"></div>

    <div class="btn-row">
      <button type="submit" class="btn btn-save" id="btn-save">Save</button>
      <button type="button" class="btn btn-cancel" id="btn-cancel">Cancel</button>
    </div>
  </form>

  <div class="success-flash" id="success-flash">
    <div class="checkmark"></div>
    <span>Shortcut added</span>
  </div>

  <script>
    (function () {
      'use strict';

      const urlInput = document.getElementById('url-input');
      const titleInput = document.getElementById('title-input');
      const groupInput = document.getElementById('group-input');
      const faviconPreview = document.getElementById('favicon-preview');
      const faviconDomain = document.getElementById('favicon-domain');
      const msgBar = document.getElementById('msg-bar');
      const form = document.getElementById('form');
      const btnSave = document.getElementById('btn-save');
      const btnCancel = document.getElementById('btn-cancel');
      const successFlash = document.getElementById('success-flash');
      const groupDatalist = document.getElementById('group-suggestions');

      // ── URL param helpers ────────────────────────────────────────────────────

      function getUrlParam(name) {
        const params = new URLSearchParams(window.location.search);
        return params.get(name) || '';
      }

      function getSmartFavicon(url) {
        try {
          const { hostname } = new URL(url);
          return 'https://www.google.com/s2/favicons?domain=' + encodeURIComponent(hostname) + '&sz=64';
        } catch {
          return '';
        }
      }

      function applyShortcutDraft(data) {
        const nextUrl = data.url || '';
        const nextTitle = data.title || '';
        const nextFavicon = data.favicon || '';

        urlInput.value = nextUrl;
        titleInput.value = nextTitle;

        if (nextFavicon) {
          faviconPreview.src = nextFavicon;
        } else if (nextUrl) {
          faviconPreview.src = getSmartFavicon(nextUrl);
        } else {
          faviconPreview.src = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
        }

        if (nextUrl) {
          try {
            faviconDomain.textContent = new URL(nextUrl).hostname;
          } catch {
            faviconDomain.textContent = nextUrl;
          }
        } else {
          faviconDomain.textContent = '—';
        }
      }

      function requestActiveTabDraft() {
        return new Promise(function (resolve) {
          chrome.runtime.sendMessage({ type: 'GET_ACTIVE_TAB_DRAFT' }, function (response) {
            if (chrome.runtime.lastError) {
              resolve({ success: false, error: chrome.runtime.lastError.message });
              return;
            }

            resolve(response || { success: false, error: 'NO_RESPONSE' });
          });
        });
      }

      async function populateFromActiveTab() {
        const response = await requestActiveTabDraft();
        if (!response || !response.success || !response.draft) {
          showWarning('Open a normal web page, then click the extension button');
          return;
        }

        applyShortcutDraft(response.draft);
        clearMsg();
      }

      // ── Init from URL params ────────────────────────────────────────────────

      const initUrl = decodeURIComponent(getUrlParam('add_url'));
      const initTitle = decodeURIComponent(getUrlParam('add_title'));
      let initFavicon = decodeURIComponent(getUrlParam('add_favicon'));

      if (initUrl) {
        applyShortcutDraft({
          url: initUrl,
          title: initTitle,
          favicon: initFavicon,
        });
      } else {
        populateFromActiveTab();
      }

      // ── Dynamic favicon on URL change ───────────────────────────────────────

      urlInput.addEventListener('input', function () {
        const val = urlInput.value.trim();
        urlInput.classList.remove('input-error');
        clearMsg();

        if (val) {
          try {
            const { hostname } = new URL(val);
            faviconDomain.textContent = hostname;
            faviconPreview.src = getSmartFavicon(val);
          } catch {
            faviconDomain.textContent = val;
            faviconPreview.src = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
          }
        } else {
          faviconDomain.textContent = '—';
          faviconPreview.src = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
        }
      });

      // ── Clear error on input ─────────────────────────────────────────────────

      urlInput.addEventListener('input', function () {
        urlInput.classList.remove('input-error');
        clearMsg();
      });

      // ── Helpers ───────────────────────────────────────────────────────────────

      function showError(msg) {
        msgBar.className = 'msg-bar visible error';
        msgBar.textContent = msg;
      }

      function showWarning(msg) {
        msgBar.className = 'msg-bar visible warning';
        msgBar.textContent = msg;
      }

      function clearMsg() {
        msgBar.className = 'msg-bar';
        msgBar.textContent = '';
      }

      function validateUrl(val) {
        try {
          const u = new URL(val);
          return u.protocol === 'http:' || u.protocol === 'https:';
        } catch {
          return false;
        }
      }

      // ── Save ─────────────────────────────────────────────────────────────────

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        clearMsg();

        const url = urlInput.value.trim();
        const title = titleInput.value.trim();

        if (!url) {
          urlInput.classList.add('input-error');
          showError('URL is required');
          urlInput.focus();
          return;
        }

        if (!validateUrl(url)) {
          urlInput.classList.add('input-error');
          showError('Enter a valid http/https URL');
          urlInput.focus();
          return;
        }

        const favicon = faviconPreview.src && !faviconPreview.src.startsWith('data:')
          ? faviconPreview.src
          : getSmartFavicon(url);

        const group = groupInput.value.trim() || undefined;

        btnSave.disabled = true;

        chrome.runtime.sendMessage(
          { type: 'ADD_SHORTCUT', url, title, favicon, group },
          function (response) {
            btnSave.disabled = false;

            if (chrome.runtime.lastError) {
              showError('Extension error: ' + chrome.runtime.lastError.message);
              return;
            }

            if (response && response.success) {
              chrome.runtime.sendMessage({ type: 'SHORTCUT_ADDED' });
              form.style.display = 'none';
              successFlash.classList.add('visible');
              setTimeout(function () { window.close(); }, 800);
            } else if (response && response.duplicate) {
              showWarning('Already in your shortcuts');
            } else {
              showError('Could not save. Try again.');
            }
          }
        );
      });

      // ── Cancel ────────────────────────────────────────────────────────────────

      btnCancel.addEventListener('click', function () {
        window.close();
      });

      // ── Escape closes popup ───────────────────────────────────────────────────

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') window.close();
      });

      // ── Load existing groups for datalist suggestions ─────────────────────────

      chrome.storage.local.get('browsermain_shortcuts', function (result) {
        const shortcuts = result['browsermain_shortcuts'] || [];
        const groups = Array.from(
          new Set(shortcuts.map(function (s) { return s.group; }).filter(function (g) { return !!g; }))
        ).sort();
        groups.forEach(function (g) {
          const option = document.createElement('option');
          option.value = g;
          groupDatalist.appendChild(option);
        });
      });

    }());
  </script>
</body>
</html>
