<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add to BrowserMain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --led-amber: #ff9500;
      --led-amber-warm: #ffb347;
      --accent-aqua: #5ee7df;
      --panel: #12121a;
      --border: #1e1e2e;
      --text: #c8c8d0;
      --text-dim: #6e6e7e;
      --danger: #ff5f5f;
      --gray-btn: #2a2a3a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      width: 300px;
      min-height: 0;
      max-height: 480px;
      overflow-y: auto;
      padding: 0;
    }

    /* ── Header ──────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
    }

    .header-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--led-amber);
      box-shadow: 0 0 6px var(--led-amber), 0 0 12px rgba(255, 149, 0, 0.4);
      flex-shrink: 0;
    }

    .header-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--led-amber);
      text-transform: uppercase;
    }

    /* ── Form ─────────────────────────────────────────────────── */
    .form {
      padding: 14px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── Favicon row ──────────────────────────────────────────── */
    .favicon-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      min-height: 40px;
    }

    .favicon-row img {
      width: 18px;
      height: 18px;
      border-radius: 3px;
      flex-shrink: 0;
      object-fit: contain;
    }

    .favicon-domain {
      font-size: 11px;
      color: var(--text-dim);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Input fields ─────────────────────────────────────────── */
    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .field input {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      width: 100%;
    }

    .field input::placeholder {
      color: var(--text-dim);
    }

    .field input:focus {
      border-color: var(--accent-aqua);
      box-shadow: 0 0 0 2px rgba(94, 231, 223, 0.12);
    }

    .field input.input-error {
      border-color: var(--danger);
      box-shadow: 0 0 0 2px rgba(255, 95, 95, 0.15);
    }

    /* ── Message bar ─────────────────────────────────────────── */
    .msg-bar {
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 5px;
      min-height: 28px;
      display: none;
    }

    .msg-bar.visible {
      display: block;
    }

    .msg-bar.error {
      color: var(--danger);
      background: rgba(255, 95, 95, 0.1);
      border: 1px solid rgba(255, 95, 95, 0.25);
    }

    .msg-bar.warning {
      color: var(--led-amber-warm);
      background: rgba(255, 179, 71, 0.1);
      border: 1px solid rgba(255, 179, 71, 0.25);
    }

    .msg-bar.success {
      color: var(--accent-aqua);
      background: rgba(94, 231, 223, 0.1);
      border: 1px solid rgba(94, 231, 223, 0.25);
    }

    /* ── Buttons ─────────────────────────────────────────────── */
    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 2px;
    }

    .btn {
      flex: 1;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      padding: 9px 0;
      border-radius: 6px;
      border: 1px solid;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s, opacity 0.15s;
      letter-spacing: 0.04em;
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .btn-save {
      background: transparent;
      color: var(--accent-aqua);
      border-color: var(--accent-aqua);
    }

    .btn-save:not(:disabled):hover {
      background: rgba(94, 231, 223, 0.1);
      box-shadow: 0 0 10px rgba(94, 231, 223, 0.2);
    }

    .btn-cancel {
      background: var(--gray-btn);
      color: var(--text-dim);
      border-color: var(--border);
    }

    .btn-cancel:not(:disabled):hover {
      background: #353545;
    }

    /* ── Success flash ────────────────────────────────────────── */
    .success-flash {
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      color: var(--accent-aqua);
      font-size: 13px;
      gap: 8px;
    }

    .success-flash.visible {
      display: flex;
    }

    .checkmark {
      width: 20px;
      height: 20px;
      border: 2px solid var(--accent-aqua);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .checkmark::after {
      content: '';
      display: block;
      width: 8px;
      height: 4px;
      border-left: 2px solid var(--accent-aqua);
      border-bottom: 2px solid var(--accent-aqua);
      transform: rotate(-45deg) translate(1px, -1px);
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-dot"></div>
    <span class="header-title">Add Shortcut</span>
  </div>

  <form class="form" id="form" novalidate>
    <div class="favicon-row">
      <img id="favicon-preview" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="favicon" width="18" height="18">
      <span class="favicon-domain" id="favicon-domain">—</span>
    </div>

    <div class="field">
      <label for="url-input">URL</label>
      <input
        id="url-input"
        type="url"
        placeholder="https://"
        autocomplete="off"
        spellcheck="false"
      >
    </div>

    <div class="field">
      <label for="title-input">Title</label>
      <input
        id="title-input"
        type="text"
        placeholder="Shortcut name"
        autocomplete="off"
        spellcheck="false"
      >
    </div>

    <div class="msg-bar" id="msg-bar"></div>

    <div class="btn-row">
      <button type="submit" class="btn btn-save" id="btn-save">Save</button>
      <button type="button" class="btn btn-cancel" id="btn-cancel">Cancel</button>
    </div>
  </form>

  <div class="success-flash" id="success-flash">
    <div class="checkmark"></div>
    <span>Shortcut added</span>
  </div>

  <script>
    (function () {
      'use strict';

      var urlInput      = document.getElementById('url-input');
      var titleInput   = document.getElementById('title-input');
      var faviconPrev   = document.getElementById('favicon-preview');
      var faviconDomain = document.getElementById('favicon-domain');
      var msgBar        = document.getElementById('msg-bar');
      var form          = document.getElementById('form');
      var btnSave       = document.getElementById('btn-save');
      var btnCancel     = document.getElementById('btn-cancel');
      var successFlash  = document.getElementById('success-flash');

      // ── Helpers ──────────────────────────────────────────────────

      function getSmartFavicon(url) {
        try {
          var hostname = new URL(url).hostname;
          return 'https://www.google.com/s2/favicons?domain=' + encodeURIComponent(hostname) + '&sz=64';
        } catch (e) {
          return '';
        }
      }

      function showMsg(msg, type) {
        msgBar.className = 'msg-bar visible ' + type;
        msgBar.textContent = msg;
      }

      function clearMsg() {
        msgBar.className = 'msg-bar';
        msgBar.textContent = '';
      }

      function isValidUrl(val) {
        try {
          var u = new URL(val);
          return u.protocol === 'http:' || u.protocol === 'https:';
        } catch (e) {
          return false;
        }
      }

      // ── Dynamic favicon on URL change ────────────────────────────

      urlInput.addEventListener('input', function () {
        var val = urlInput.value.trim();
        urlInput.classList.remove('input-error');
        clearMsg();

        if (val) {
          try {
            var u = new URL(val);
            faviconDomain.textContent = u.hostname;
            faviconPrev.src = getSmartFavicon(val);
          } catch (e) {
            faviconDomain.textContent = val;
            faviconPrev.src = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
          }
        } else {
          faviconDomain.textContent = '—';
          faviconPrev.src = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
        }
      });

      // ── Save ────────────────────────────────────────────────────

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        clearMsg();

        var url = urlInput.value.trim();
        var title = titleInput.value.trim();

        if (!url) {
          urlInput.classList.add('input-error');
          showMsg('URL is required', 'error');
          urlInput.focus();
          return;
        }

        if (!isValidUrl(url)) {
          urlInput.classList.add('input-error');
          showMsg('Enter a valid http/https URL', 'error');
          urlInput.focus();
          return;
        }

        var favicon = faviconPrev.src && !faviconPrev.src.startsWith('data:')
          ? faviconPrev.src
          : getSmartFavicon(url);

        btnSave.disabled = true;

        chrome.runtime.sendMessage(
          { type: 'ADD_SHORTCUT', url: url, title: title, favicon: favicon },
          function (response) {
            btnSave.disabled = false;

            if (chrome.runtime.lastError) {
              showMsg('Extension error: ' + chrome.runtime.lastError.message, 'error');
              return;
            }

            if (response && response.success) {
              form.style.display = 'none';
              successFlash.classList.add('visible');
              setTimeout(function () { window.close(); }, 800);
            } else if (response && response.duplicate) {
              showMsg('Already in your shortcuts', 'warning');
            } else {
              showMsg('Could not save. Try again.', 'error');
            }
          }
        );
      });

      // ── Cancel ──────────────────────────────────────────────────

      btnCancel.addEventListener('click', function () {
        window.close();
      });

      // ── Escape closes popup ────────────────────────────────────

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') window.close();
      });

    }());
  </script>
</body>
</html>
